front:
  text: 雲宫法語卷下
  hash: sha256:c9bbda4e0bef8668848aafbbf8926f11db45351491af88ccfbb9f4fb902b79fd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0072_HFL_002-001a, image: hfl/0725/0725-152.png}
body:
  text: 績水虛夷子靜安汪可孫纂明善品第四書曰人心惟危道心惟微惟精惟一允執厥中孟子曰大人者不失其赤子之心純一無僞之謂也大學曰正心者身有忿懥則不得其正有所恐懼則不得其正有所好樂則不得其正有所憂患則不得其正心不在焉視而不見聽而不聞食而不知其味此修身在正其心盂子曰操則存舍則亡出入無時莫知其鄉唯心之謂歟又曰我四十不動心又曰養心莫善於寡慾又曰學問之道無他求其放心而已斗經釋曰人之運心於外則神遊而逝定心於内則神安以和一切善惡亦存乎心心者神明之府行藏動息善惡之事欲萌悉知之人之妄心可不息乎又曰人之元辰外寄於目内藏於心目則外視於萬物心則内馳於萬機心目所馳神亦奔競故謂之元辰釋馬馳事而不息人能收心復照存玄靈於一已則却走馬以糞楞嚴經曰如來常說諸法唯心所造一切因果因心成體張無盡曰了此妄心即是清淨佛性虛靜心戒曰心者萬法之宗九竅之主以其越古今而不壞故曰眞如一念萌動於内六識流轉於外不趨乎善則趨乎惡清靜經曰旣有妄心則驚其神旣驚其神則著萬物旣著萬物則生貪求旣生貪求則是煩惱定觀經曰覺心起即滅滅即除惟滅動心不滅照心但凝空心不凝住心金剛經曰過去心不可得現在心不可得未來心不可得六祖曰妄心是眞心上影子經云汝身汝心皆是妙明性中所現之物知諸心之非心則知心之體若妄心則有過現未來眞性則寂然不動已上言心橫渠曰心統性情又曰虛靈不昧便是心此理具足無少欠闕便是性隨感而動便是情义曰由太虛有氣之名由氣化有道之名合虛與氣有性之名合性與知覺有心之名靈底是心實處是性湯誥曰惟皇上帝降衷于下民若有恒性伊尹曰習與性成祖伊曰不虞天性盂子道性善全說理中庸曰天命之謂性帶人物而言有天命須是有此氣方能承當得此理無此氣則此理如何頓放程子曰論性不論氣不備論氣不論性不明近思録言心一也有指體而言寂然不動有指用而言感而遂通朱子曰靜而常覺動而常正心之妙也寂而感感而寂孔子言性近習逺盂子言盡心知性存心養性事天盂子曰仁之於父子義之於君臣禮之於賔主智之於賢者聖人之於天道命也有性也君子不謂命易曰窮理盡性以至於命又曰聖人之作易也將以順性命之理魯哀公問於孔子曰人之命與性何謂也形於一謂之性人各受陰陽以剛柔之性故曰形於一内觀經曰自一禀形謂之性朱子曰性是太極渾然之體初不可以名字言已上言心性前諸條目儒家言存心養性道釋言明心見性儒以實理爲性見之行事者也道釋以自然無爲爲性者也愚謂道釋之言性乃未發之中儒者之言性發而皆中節之謂見性之謂道猶見性之謂見佛也佛之言訓覺是殆非以泥木所塑造之謂佛也持用品第五顔淵曰舜何人也予何人也有爲者亦若是子曰知而弗爲不如勿知華嚴經曰我不輕於汝等汝等皆當作佛佛西方聖人之稱也六祖曰不悟者爲衆生爲凡夫悟者名佛佛訓大覺之稱人受天地之氣而生同有此善然覺有先後後覺者必效先覺之所爲乃可明善而復其初斯言至矣聖人生知安行不倦於學賢者學而知之亦欲强行困而不學民斯爲下曾子三省忠恕一貫君子九思三畏三戒顏子克復四勿孔子絶四絜矩愼獨皆所當平日持用工夫誠意毋自欺也一者誠而已無妄之謂誠不欺其次矣康節曰先天主乎誠至誠可以通神明不誠則不可以得道誠者主性之具無端無方者也至誠之道可以前知曰在我無一毫私僞故常虛明自能見得誠者天之道誠之者人之道誠者不勉而中不思而得從容中道聖人也誠之者擇善而固執之也自誠明之謂性自明誠之謂教誠則明明則誠唯天下至誠爲能盡其性可以賛天地之化育與天地參又曰唯天下至誠爲能化誠者物之終始不誠無物至誠無息不息則久悠久無疆唯天下至誠爲能經綸天下之大經立天下之大本知天下之化育夫焉有所倚大經五品之人倫大本所性之全體聖人極識無妄自然功用豈有所倚著於物而後能詩云維天之命於穆不已蓋曰文王之所以爲文也於乎丕顯文王之德之純純亦不已又曰穆穆文王緝熙敬止易曰天行徤君子以自强不息湯之盤銘曰苟日新日日新又日新回之爲人擇乎中庸得一善則拳拳服膺而弗失道不可須臾離可離非道也太極老君與傅先生木鑽在焦山石室使穿一石盤可五尺積四十九年而石穿孟子曰一日暴之十日寒之未有能生者先儒曰敬之一字聖學之所以成始而成終也程子以主一無適言敬又曰至誠無息誠者眞實無妄也蓋人心易於散慢若不立箇規矩維持之常常提警則放逸而無所歸惟主一惟至誠所以成始成終愚謂人患於作輟佛教亦謂之斷常譬如蒸砂終不成飯襌家之常惺惺法必念念相續故云勇猛精進不退轉亦說得好與儒者之主一無息同此機也誠敬不可斯須去身造微品第六華嚴頌曰色身非是佛音聲亦復然亦不離色身見佛神通力莊子曰君子尸居而龍見淵默而雷聲神動而天隨從容無爲廣成子曰至道之精窈窈冥冥至道之極昏昏黙默無視無聽抱神以靜形將自正必淨必清宻多心經曰照見五藴皆空昇玄經曰清淨六根斷除邪障得道經曰心目内觀眞炁所有清淨光明虛白晃耀又頌曰杳杳冥冥清淨道昏昏黙黙太虛空體性湛然無所住色心都寂一眞宗本行經曰諸念不生萬縁頓息塵沙惡業隨念消散一切天魔自然殄滅清靜經曰人能常清靜天地悉皆歸又曰無無旣無湛然常寂寂無所寂慾豈能生慾旣不生即是眞靜常應常靜常清靜矣道德經曰衆人熙熙如登春臺如享太牢我獨泊兮其未兆如嬰兒之未孩又曰專炁致柔能嬰兒又曰復歸於嬰兒張無盡曰無得之得名眞得無說之說乃眞說虛卞禪師曰大乘之法心無罣碍得大自在作而無作爲而無爲此所以爲聖明賢詩曰上天之載無聲無臭至矣川老頌曰見色聞聲世本常一重雪上一重霜君今要見黄頭老走入摩耶腹内藏此返本還元之學迴光返照之機深入於忘光絶照至矣神化品第七洪範九五福曰考終命易曰易與天地準是故知幽明之故原始反終知死生之說魯哀公問於孔子子曰化終陰陽象形而發謂之生生化無窮數盡謂之死故命者性之始死者生之終也有始則必有終矣子曰未知生焉知死樂天曰死者數之終孟子曰盡其道而死者正命也桎梏而死者非正命也知命者不立乎巖墻之下書曰兹殷多先哲王在天解曰商家多有在先明哲之王精爽在天易曰遊𩱿爲變易曰知鬼神之情狀易曰窮神知化德之盛也子曰鬼神之爲德其盛矣乎視之而弗見聽之而弗聞體物而不可遺使天下之人齊明盛服以承祭祀洋洋乎如在其上如在其左右神之格思不可度思矧可射思夫徴之顯誠之不可掩如此先儒引禮書曰諸侯因國之祭祭其國之無主後者如齊大公封於齊便是祭爽鳩氏季蒯逢伯陵蒲姑氏之屬蓋他先主此國來禮合祭也如衛侯夢康叔云相奪予饗蓋衛後都帝丘夏后相亦都帝丘則都其國自合當祭不祭者冥其如此如𣈆侯夢黄熊入其寢門以爲鯀之神亦是此類不成說有子孫底方有感格之理便使其無子孫其氣亦未嘗亡也如今祭勾芒他更是逺然旣合當祭他便有此氣要之通天地人只是這一氣所以說洋洋乎如在其上如在左右虛空偪塞無非此理自要人看得活晦庵朱文公曰口鼻之噓吸爲𩱿耳目之精明爲𩲸陽𩱿爲神陰𩲸爲鬼其在人也陰陽合則𩲸凝𩱿聚而有生陰陽判則𩱿升爲神𩲸降爲鬼以徃來言則來者方伸而爲神往者旣屈而爲鬼二氣之分一氣之運故孔子祭義曰氣也者神之盛也𩲸也者鬼之盛也鄭氏注曰氣呼吸出入者也耳目之聰明爲𩲸然則陰陽未可言鬼神陰陽之靈乃鬼神也𩲸者形之神𩱿者氣之神𩱿𩲸是形氣之精爽謂之靈前夜因說箇修養人死時衝突知得焄蒿之意甚切謂其氣襲人知得悽愴之意分明漢武李夫人祠云其風肅然今鄉村有衆户還賽祭享或有肅然如陣風俗呼爲旋風即此意今時惡氣中人使人恐懼悽愴此爲物之精爽也天道流行發育萬物人得之以有生氣之清者爲氣氣之燭者爲質知覺運動陽之爲也形體陰之爲也氣爲𩱿體爲𩲸釋氏以性爲魂幻爲𩲸高誘淮南子注曰𩱿者陽之神𩲸者陰之神以其主乎形氣故曰神人所以生精聚氣也人只有許多氣須有箇盡時盡則神氣歸天形𩲸歸地今釋氏以性爲本幻爲命誠如是也凡人將死熱氣漸微所謂𩱿升下體漸冷眼光落所謂𩲸降有生必有死有始必有終聚散者氣也若夫妖孽者是不得其死之人其氣未散鬱結而成妖晦庵釋屈子逺遊篇曰𩲸不受𩱿𩱿不載𩲸則𩱿遊𩲸降而死又曰𩲸𩱿者譬如燒香燒出來汁子便是𩲸那成煙後香底便是𩱿𩱿者𩱿之光焰𩲸者𩱿之根蒂修鍊之士必使𩱿常附𩲸如日光載月質𩲸常檢𩱿如月質受日光則神不馳而𩲸不死遂能登仙逺去而上征易曰大而化之之謂聖聖而不可知之之謂神神無方而易無體雲宫法語卷下
