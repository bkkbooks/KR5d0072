  text: 雲宫法語卷上
  hash: sha256:9fdd3dfab141f6162016c48a887a5303ccffcc0311736d8e36945126eb5a8371
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0072_HFL_001-001a, image: hfl/0725/0725-132.png}
body:
  text: 績水虛夷子靜安汪可孫纂先天品第一原天地未判之始有太易有太初有太始有太素太易者未見氣者也太初者氣之始也太始者形之始也太素者質之始也氣形質具而未相離乃謂之混沌混沌既判乃開天地老子曰有物混成先天地生道經曰太上至真無極大道度人經曰上無復祖唯道為身又曰元始祖氣周濂溪曰無極而太極又曰無極之真康節曰若論先天一事無程子曰人生而靜巳上不容說無極則不容言亦無體段之可名才說已不是後天品第二易有太極是生兩儀兩儀生四象四象生八卦闔户謂之坤闢户謂之乾一闔一闢謂之變乾陽物也坤陰物也乾為天稱父坤為地稱母陰陽合德而剛柔有體以體天地之撰一陰一陽之謂道故曰精氣為物周子曰二五之精妙合而凝二氣交感化生萬物生生而變化無窮穀梁曰獨陰不生獨陽不生參合而生素問曰天地者萬物之父母陰陽者血氣之男女生育者人倫之本故陽內陰外陰含陽胎而男形成陽外陰內陽含陰胎而女形成九章經曰人之受生於胞胎之中三元育養九氣結形九月神布氣滿能聲聲尚神具九天稱慶於是而生般若經曰色身又曰胎生卵生濕生化生六祖曰卵生迷性胎生習性濕生隨邪性化生見趣性子夏曰商聞易之生論及萬物鳥獸昆蟲各有奇偶氣分不同而凡人莫知其情唯達德者能原其本焉天一地二人三三如九九九八十一一主日日數十故人十月而生陽從奇故日數十甲至癸八九七十一偶以從奇奇主辰辰為月月主馬故馬十二月而生七九六十三三主斗斗主狗故狗三月而生六九五十四四主時時主豕故豕四月而生斗次日月故以主斗四九三十六六為律律主鹿故鹿六月而生三九二十七七主星星主虎故虎七月而生星二十八宿為四方方有七度七主星二九一十八八主風風為蟲故蟲八月而生風之類盡於八九蟲為風風為蟲其餘各從其類鳥魚生陰而屬於陽故皆卵生魚游於水鳥游於雲故立冬則燕雀入海化為蛤蠶食而不飲蟬飲而不食蜉蝣不飲不食萬物之所以不同介鱗夏食而冬蟄介甲蟲也齕吞者八竅而卵生鳥屬齟齬者九竅而胎生九竅人及獸屬四足者無羽翼戴角者無上齒無角無前齒者膏無角無齒者脂淮南取此又曰無角者膏而無前有角者脂而無後晝生者類父夜生者似母是以至陰主牝至陽主牡敢問其然乎孔子曰吾昔聞老聃亦如汝之言子夏曰商聞山書曰地東西為緯南北為經山為積德川為積形高者為生下者為死丘陵為牡溪谷為牝蚌蛤龜珠與日月而盛虛月盈則蚌珠之屬滿月虧則虛是故堅土之人剛弱土之人柔墟土之人大沙土之人細息土之人美㘪土之人醜㘪耗字息土細微延土粗疏者也食水者善遊而耐寒食土者無心而不息蟥屬不氣息也食木者多力而不治血氣不治淮南子曰多力而弗戾亦不治之貌食草者善走而愚食桑者有緒而蛾食肉者勇毅而悍食氣者神明而壽食穀者智慧而巧不食者不死而神故曰羽蟲三百有六十而鳳為之長毛蟲三百有六十而麟為之長甲蟲三百有六十而龜為之長鱗蟲三百有六十而龍為之長倮蟲三百有六十而人為之長此乾坤之策也乾天坤地魯哀公問於孔子孔子曰人始生而有不具者五焉目無見不能食不能行不能言不能化及生三月而徴煦曈人也然後有見八月生齒然後能食三年腮合然後能言十有六而精通然後能化陰窮反陽故陰以陽變陽窮反陰故陽以陰化是以男子八月而生齒八歲而齠女子七月而生齒七歲而齔十有四而化一陰一陽奇耦相配然後合道化成性命之端形於此也公曰男子十六精通女子十四而化則可以生矣簡狄吞玄鳥遺卵生契姜原履巨人跡悅而踐之身動如孕居期生后稷天地初分一氣生元始二氣生元皇三氣生老君而為化主在天為萬天之主降世為百王之師在星曰天皇大帝在教曰太上老君老君之生其母剖左腋而生頭已白矣又曰八十一化出世間實録曰初顔氏禱於尼丘山而生孔子孔子生而首上圬頂如尼丘山因名丘字仲尼是夕有二龍繞室五老降庭五老者五星之精也顔氏之房聞奏鈞天之樂未生時有麟吐玉書於闕里其文曰水精之子繫衰周而素王顔氏異之以繡紱繫麟角信宿而麟去普曜經曰釋迦兜率天降神於西域迦維國淨飯王宫摩耶夫人剖右脅而生漢武帝皇子弗陵生沙間趙倢妤居鉤弋宫妊身十四月生上曰聞昔堯十四月而生今鉤弋亦然命曰堯母門孝經曰天地之性人為責玄靈經曰人身難得周子曰人為萬物之靈玄武經曰真武神母夢吞日光覺而有孕二十四箇月而生宋楊文公祖夢有人言武夷君托化及大年生乃一卵形剖之為一鸜雛紫毛被體貯而棄之江濱其叔父異之追而至於江化成嬰兒歸而撫之後為光祿丞夏后氏之衰後宫人處室感龍漦而孕是生褒姒以亂天下楚詞曰女岐無夫而生九子九子母也凡此類非一略舉數端可以見禀天地之秀氣宿骨不凡聖賢之質也禀惡濁不正之氣為愚為凶為妖孽矣宋曹彬後封武惠王方一周歲風俗有試周之事其家以玩好寶玉飲食之類排列滿前抱王觀之王獨左手持干戈右手取俎豆其後為趙太祖平江南夫人自一歲好惡之情生焉然於其不能言不能行之際所謂好惡乃赤子純一無僞之真及其既長也好惡之情不合於公者多矣養生品第三老子曰吾有大患唯吾有身及吾無身吾有何患素問曰男女必當其年男子二八精氣溢瀉必三十而娶女子二七天癸至必二十而嫁欲其二氣充實則孕而育育而壽古者是以上壽多百二十歲今人之患在婚嫁之早男未二十女未十五而已嫁娶真元早喪矣及其長也又不知補損之方譬如一燈其中所注之油即賦豫之元氣器之大小數之短長然燈於無風之地而又加愛護則燈可久盡則滅然燈於當風膏油易涸且致暴滅之患人之命賦壽夭亦猶是也哀公問孔子曰知者壽乎仁者壽乎孔子曰人有三死而非其命也巳自取也夫寢處不時飮食不節勞逸過度者疾苦殺之居下位而上干其君嗜欲無厭而求不止者刑共殺之以少犯衆以弱侮强忿怒不類動不量力兵共殺之此三者死非人命也人自取之若夫智士仁人持身有節動靜有義喜怒以時無害其性得壽宜乎廣成子與黃帝曰無勞爾形無搖爾精乃可長生左氏曰天有六氣降生五味發為五色徵為五聲淫生六疾六氣者陰陽風雨晦明也分為四時序為五節過則為災陰淫寒疾陽淫熱疾風淫末疾雨淫腹疾晦淫惑疾明淫心疾鄉黨篇載孔子十不食盂子曰食之以時用之以禮又曰見其生不忍見其死聞其聲不忍食其肉是以君子逺遠庖厨也夫飲食起居養生之大要故聖人罔有不欽焉蓋飲食之間五味不宜過過則為傷矣爽口味多須作疾是也而勞心勞力者傷四肢血氣焉皓齒蛾眉伐性之斧甘脆肥鮮腐腸之藥故人在戒殺以積德節飲食省嗜欲又省疾延年也修養家瀉五臟之有餘噓肝呵心呬肺呼脾吹腎補五臟之不足則隨臟吸之元始太玄經曰喜怒損性哀樂損神損性則害生故養性以全氣保神以安身氣全體平心安神逸全生之訣也黃帝謂岐伯曰夫人者受天地之氣以生之來也謂之精精之遘謂之靈靈之發也謂之神神之化也謂之𩱿𩱿隨神往來謂之識並精出入謂之𩲸主榮積魂謂之心心有所從謂之情情有所屬謂之意意之有所指謂之志志有所憶謂之思思之有所遠慕謂之慮慮而事成謂之智智者盡此諸見者焉蓋精神𩲸𩱿意情智見識之為用孫真人曰髮宜多擲齒宜數叩液宜常咽氣宜常鍊精宜常在抱朴子曰天靈一穴乃萬神朝宗之所得一而萬事畢莊子謂之見獨黃帝謂之呼吸精氣獨立守神太上謂之寂兮寥兮獨立而不改周行而不怠獨者一也所謂守一以資神依神以守一夫守一者可與天地相畢壽命無窮老子道德經曰知其白守其黑又曰歸根曰靜靜曰復命是也玄一者是我之元命真人生而守之守之極靜得之守之不復去矣黃庭經曰玄元上一魂魄鍊一之為物頗卒見須得至真乃顧盻至忌死氣以穢賤論曰人之生從虛無而有所以神化氣氣化精是有形用之之道智者不施於外而施於己則精復化為氣氣復化為神鍊神合道復證虛無之妙此歸根復命之方修真養命之術孟子曰夭壽不二修身以俟之所以立命也知命者不立乎巖墻之下孔子曰五十而知天命不知命無以為君子也劉子曰民受天地之中以生所謂命也易曰窮理盡性以至於命又曰聖人之作易也將以順性命之理又曰君子行法以俟命居易以俟命魯哀公問於孔子曰人之命與性何謂也子曰分與道謂之命內觀經曰從道受生謂之命孟子曰口之於味目之於色耳之於聲鼻之於臭四肢之於安佚性也有命焉君子不謂性也程子曰五者之欲性也然有分不能皆如其願是命此命是言賦豫之理雲宫法語卷上
