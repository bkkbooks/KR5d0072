body:
  text: 雲宫法語序别九萬形皆有弊惟道獨不朽人之在天地間斯道之寄也有命焉有性焉天命之謂性率性之謂道也天下無二道豈有二性命哉危徴精一見於大舜之戒禹恆性習性明性節性見於湯尹周公之格言夫子贊易曰各正性命則性與命並言之矣然觀夫子罕言命與仁而性與天道不可得聞性命之學非深造者不能貫通也至曾思盂之相傳性命之學愈著而愈詳儒者以養性率性為先知命立命為務故功極於贊化育參天地彼道釋明心見性修命復命至於妙有真空與道合真道釋性命之學亦不能泯滅也後世流弊儒以文章沽爵祿道釋以禍福誘愚庸躬行踐履之間鮮有出於性命之正者況三綱五常道之大原天命民彝庸有未盡豈所以為道哉聖明之朝作之君師吾儒之道尊勸益加道釋二氏不廢崇奬期天下咸歸於道泰和盛治家稷契而人臯陶無上等正覺釋老中之功用於是談性命者多矣然而未得其歸一之要余倣之經傳類而編之吾儒之道由正心誠意而得佛老之道亦由正心誠意而得也人欲盡淨天理流行即一念不生全體自見之大機括大而化聖而神捨是非吾所謂道非吾所謂性命名其集曰雲宫法語道書謂偃息雲宫黃房之內即心齊坐忘之時究竟斯道庶乎瞻前忽後無時不然仰不愧而俯不怍豈徒虛無空寂之謂性命云大德戊戌秋績水虛夷子靜安汪可孫序
